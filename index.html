<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirath.cs</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#003366; color:white; text-align:center; padding:15px; position:relative; }
.admin-btn { position:absolute; left:10px; top:10px; background:#222; color:white; padding:8px; cursor:pointer; }
.home-btn { position:absolute; right:10px; top:10px; background:green; color:white; padding:8px; cursor:pointer; }
.container { max-width:900px; margin:20px auto; background:white; padding:20px; border-radius:10px; }
.hidden { display:none !important; }
.loan-card { border:2px solid #003366; padding:15px; margin:10px; cursor:pointer; text-align:center; }
.loan-card:hover { background:#003366; color:white; }
input, textarea, select { width:100%; padding:10px; margin-top:10px; box-sizing: border-box; }
button { margin:5px; padding:8px; background:#003366; color:white; border:none; cursor:pointer; }
table { width:100%; border-collapse:collapse; margin-top: 20px; }
td, th { border:1px solid #ccc; padding:8px; text-align: left; }
th { background:#003366; color:white; }
.admin-nav { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD3LvM3vDAQaloT2v0FWYObSr9LC5gjmE8",
  authDomain: "helpbhart.firebaseapp.com",
  databaseURL: "https://helpbhart-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "helpbhart",
  storageBucket: "helpbhart.firebasestorage.app",
  messagingSenderId: "60675846187",
  appId: "1:60675846187:web:5e02b72d2e61908871ba6e",
  measurementId: "G-J8J5ZPEVZZ"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

</head>

<body>

<header>
<div class="admin-btn" onclick="showSection('login')">Admin</div>
<div class="home-btn" onclick="showSection('home')">Home</div>
<h2>Kirath.cs</h2>
</header>

<div class="container">

<div id="home-section">
<h3>Select Loan</h3>
<div class="loan-card" onclick="openForm('Home Loan')">Home Loan</div>
<div class="loan-card" onclick="openForm('Personal Loan')">Personal Loan</div>
<div class="loan-card" onclick="openForm('Business Loan')">Business Loan</div>
<div class="loan-card" onclick="openForm('KCC Loan')">KCC Loan</div>
<div class="loan-card" onclick="openForm('Tractor Loan')">Tractor Loan</div>
<hr>
<h3>Verification Services</h3>
<div class="loan-card" onclick="openService('cibilData','CIBIL Check')">CIBIL Check</div>
<div class="loan-card" onclick="openService('aadharData','Aadhar Verification')">Aadhar Verification</div>
<div class="loan-card" onclick="openService('rcData','RC Details')">RC Details</div>
<div class="loan-card" onclick="openService('panData','PAN Verification')">PAN Verification</div>
<div class="loan-card" onclick="openService('bankData','Bank Verification')">Bank Verification</div>
<div class="loan-card" onclick="openService('otherData','Other Verification')">Other Verification</div>
<hr>
<button onclick="showSection('recharge')">Recharge</button>
<button onclick="showSection('support')">Support</button>
</div>

<div id="login-section" class="hidden">
    <h3>Admin Login</h3>
    <input type="password" id="adminPass" placeholder="Enter Admin Password">
    <button onclick="adminLogin()">Login</button>
</div>

<div id="admin-panel-section" class="hidden">
    <h3>Admin Dashboard</h3>
    <div class="admin-nav">
        <button onclick="fetchAdminData('loanApplications')">Loans</button>
        <button onclick="fetchAdminData('recharges')">Recharges</button>
        <button onclick="fetchAdminData('queries')">Queries</button>
        <button onclick="fetchAdminData('cibilData')">CIBIL</button>
        <button onclick="fetchAdminData('aadharData')">Aadhar</button>
        <button onclick="fetchAdminData('panData')">PAN</button>
        <button onclick="fetchAdminData('rcData')">RC</button>
        <button onclick="fetchAdminData('bankData')">Bank</button>
        <button onclick="fetchAdminData('otherData')">Others</button>
    </div>
    <div id="admin-display-area">
        <p>Select a category to view data.</p>
    </div>
</div>

<div id="form-section" class="hidden">
<h3 id="title"></h3>
<form id="loanForm">
<input type="hidden" id="loanType">
<input type="text" id="name" placeholder="Name" required>
<input type="tel" id="mobile" placeholder="Mobile" required>
<input type="number" id="age" placeholder="Age" required>
<button type="submit">Submit</button>
</form>
</div>

<div id="service-section" class="hidden">
<h3 id="serviceTitle"></h3>
<form id="serviceForm">
<input type="hidden" id="serviceKey">
<input type="text" id="sname2" placeholder="Customer Name" required>
<input type="tel" id="smobile2" placeholder="Mobile Number" required>
<button type="submit">Submit</button>
</form>
</div>

<div id="recharge-section" class="hidden">
<h3>Recharge</h3>
<form id="rechargeForm">
<input type="text" id="rname" placeholder="Name" required>
<input type="tel" id="rmobile" placeholder="Mobile" required>
<select id="company">
<option>Airtel</option>
<option>Jio</option>
<option>VI</option>
<option>BSNL</option>
</select>
<input type="number" id="amount" placeholder="Amount" required>
<button type="submit">Recharge</button>
</form>
</div>

<div id="support-section" class="hidden">
<h3>Support</h3>
<form id="supportForm">
<input type="text" id="sname" placeholder="Name" required>
<input type="tel" id="smobile" placeholder="Mobile" required>
<textarea id="query" placeholder="Query"></textarea>
<button type="submit">Submit</button>
</form>
</div>

</div>

<script>
const loanForm = document.getElementById("loanForm");
const serviceForm = document.getElementById("serviceForm");
const rechargeForm = document.getElementById("rechargeForm");
const supportForm = document.getElementById("supportForm");

function showSection(id){
    document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
    const section = document.getElementById(id+'-section');
    if(section) section.classList.remove('hidden');
}

function openForm(type){
    showSection('form');
    document.getElementById("title").innerText = type;
    document.getElementById("loanType").value = type;
}

function openService(key, titleTxt){
    showSection('service');
    document.getElementById("serviceKey").value = key;
    document.getElementById("serviceTitle").innerText = titleTxt;
}

function saveData(key, data){
    db.ref(key).push(data);
}

// Admin Login Logic
function adminLogin() {
    const pass = document.getElementById("adminPass").value;
    // Password set to 'admin123'
    if(pass === "admin123") {
        showSection('admin-panel');
    } else {
        alert("Incorrect Password!");
    }
}

// Fetch and Show Data in Admin Panel
function fetchAdminData(key) {
    const displayArea = document.getElementById("admin-display-area");
    displayArea.innerHTML = "<p>Loading...</p>";

    db.ref(key).once('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) {
            displayArea.innerHTML = "<p>No data found.</p>";
            return;
        }

        let tableHtml = `<table><thead><tr>`;
        const firstItem = Object.values(data)[0];
        const headers = Object.keys(firstItem);
        
        headers.forEach(h => tableHtml += `<th>${h.toUpperCase()}</th>`);
        tableHtml += `</tr></thead><tbody>`;

        Object.values(data).forEach(row => {
            tableHtml += `<tr>`;
            headers.forEach(h => tableHtml += `<td>${row[h]}</td>`);
            tableHtml += `</tr>`;
        });

        tableHtml += `</tbody></table>`;
        displayArea.innerHTML = `<h4>Displaying: ${key}</h4>` + tableHtml;
    });
}

loanForm.onsubmit = e => {
    e.preventDefault();
    const data = {
        type: document.getElementById("loanType").value,
        name: document.getElementById("name").value,
        mobile: document.getElementById("mobile").value,
        age: document.getElementById("age").value
    };
    saveData('loanApplications', data);
    alert("Submitted Successfully ✅");
    loanForm.reset();
    showSection('home');
};

serviceForm.onsubmit = e => {
    e.preventDefault();
    const key = document.getElementById("serviceKey").value;
    const data = {
        name: document.getElementById("sname2").value,
        mobile: document.getElementById("smobile2").value
    };
    saveData(key, data);
    alert("Submitted Successfully ✅");
    serviceForm.reset();
    showSection('home');
};

rechargeForm.onsubmit = e => {
    e.preventDefault();
    const data = {
        name: document.getElementById("rname").value,
        mobile: document.getElementById("rmobile").value,
        company: document.getElementById("company").value,
        amount: document.getElementById("amount").value
    };
    saveData('recharges', data);
    alert("Submitted Successfully ✅");
    rechargeForm.reset();
    showSection('home');
};

supportForm.onsubmit = e => {
    e.preventDefault();
    const data = {
        name: document.getElementById("sname").value,
        mobile: document.getElementById("smobile").value,
        query: document.getElementById("query").value
    };
    saveData('queries', data);
    alert("Submitted Successfully ✅");
    supportForm.reset();
    showSection('home');
};
</script>

</body>
</html>
